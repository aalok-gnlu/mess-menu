<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Campus Mess Menu</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%; background-color: #0f0f11; color: #ffffff;
            font-family: 'Inter', sans-serif; overflow: hidden; 
        }

        .icon { width: 24px; height: 24px; fill: currentColor; display: inline-block; vertical-align: middle; }

        /* Full Screen Backgrounds for Transitioning */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: brightness(0.3) blur(8px); z-index: 1;
            transition: opacity 0.8s ease-in-out; opacity: 0; pointer-events: none;
        }
        .bg-layer.active { opacity: 1; }

        /* Shimmer Overlay */
        .shimmer-effect {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
            transform: translateX(-100%); z-index: 2; pointer-events: none;
        }
        .shimmer-effect.play { animation: shimmerSweep 0.8s ease-in-out forwards; }
        @keyframes shimmerSweep { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* Native Scroll Capture Layer for infinite smooth scrolling */
        .scroll-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            overflow-y: auto; scroll-snap-type: y mandatory; z-index: 10;
            -ms-overflow-style: none; scrollbar-width: none;
        }
        .scroll-layer::-webkit-scrollbar { display: none; }
        
        .scroll-item-proxy { width: 100%; height: 80px; scroll-snap-align: center; pointer-events: none; }

        /* Wheel UI Container */
        .wheel-ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 15; pointer-events: none; 
        }

        /* Arc ring for aesthetic */
        .wheel-arc {
            position: absolute; border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;
        }

        /* The Revolving Meal Images */
        .wheel-item {
            position: absolute; width: 50px; height: 50px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4); overflow: hidden; pointer-events: auto;
            cursor: pointer; opacity: 0.4; background: #2a2a2d; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), 
                        height 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), 
                        border-radius 0.4s cubic-bezier(0.2, 0.8, 0.2, 1),
                        border-width 0.4s, opacity 0.4s;
        }
        .wheel-item img {
            width: 100%; height: 100%; object-fit: cover; pointer-events: none;
            user-select: none; -webkit-user-drag: none; border-radius: inherit; transition: inherit;
        }

        /* Active Selected Item */
        .wheel-item.active {
            width: 90px; height: 90px; border-radius: 16px; border: 3px solid #fff;
            opacity: 1; box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 20;
        }

        /* Right Hand Info Panel */
        .info-panel {
            position: absolute; top: 50%; transform: translateY(-50%);
            left: 120px; right: 20px; display: flex; flex-direction: column; 
            justify-content: center; align-items: flex-start;
            pointer-events: auto; cursor: pointer; z-index: 20;
        }

        @media (min-width: 768px) {
            .info-panel { left: 35vw; right: 10vw; }
            .wheel-item { width: 60px; height: 60px; }
            .wheel-item.active { width: 110px; height: 110px; }
        }

        .info-panel .happy-text {
            font-size: 0.85rem; color: rgba(255, 255, 255, 0.85); text-transform: uppercase;
            letter-spacing: 2px; font-weight: 600; margin-bottom: 6px;
        }

        .info-panel .main-dish {
            font-family: 'Playfair Display', serif; font-size: clamp(1.4rem, 5.5vw, 2.8rem);
            line-height: 1.15; font-weight: 700; color: #fff; margin-bottom: 12px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.8);
            display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
        }

        .badge-row { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }

        .info-panel .meal-type {
            font-size: 0.75rem; font-weight: 800; background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            padding: 4px 10px; border-radius: 20px; text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .info-panel .holiday-badge {
            background: #f87171; color: #fff; padding: 3px 8px; border-radius: 12px;
            font-size: 0.65rem; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; display: none;
        }

        /* Dynamic Status Indicator */
        .status-badge {
            font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 20px;
            display: inline-block; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff;
        }
        .status-serving { background: rgba(74, 222, 128, 0.2); border-color: #4ade80; color: #4ade80; }
        .status-stopped { background: rgba(248, 113, 113, 0.2); border-color: #f87171; color: #f87171; }
        .status-starting { background: rgba(251, 191, 36, 0.2); border-color: #fbbf24; color: #fbbf24; }

        .info-panel .timing { font-size: 0.75rem; color: rgba(255,255,255,0.7); display: flex; align-items: center; gap: 4px; margin-top: 6px;}

        /* Bottom Sheet Modal - Re-engineered for zero shadow bleed when closed */
        .bottom-sheet {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh;
            background: rgba(20, 20, 22, 0.95); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); border-top-left-radius: 30px; border-top-right-radius: 30px;
            z-index: 100; padding: 30px 24px; display: flex; flex-direction: column; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            /* Hardware accelerated off-screen hiding */
            transform: translateY(120%);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease;
        }
        
        .bottom-sheet.open { 
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        
        .sheet-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
        .sheet-title { font-family: 'Playfair Display', serif; font-size: 2rem; color: #fff; line-height: 1.1; }
        .close-btn { background: rgba(255,255,255,0.1); border: none; width: 40px; height: 40px; border-radius: 50%; color: #fff; display: flex; justify-content: center; align-items: center; cursor: pointer; flex-shrink: 0; }
        .sheet-section { margin-bottom: 24px; overflow-y: auto; flex: 1; padding-bottom: 20px; }
        .section-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #aaa; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .items-list { font-size: 1.05rem; line-height: 1.6; color: #eee; margin-bottom: 20px; }

        .nutrition-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .nutrition-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 16px; display: flex; align-items: center; gap: 12px; }
        .nutrition-card .icon-wrapper { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 12px; color: #FF6B6B; }
        .nutrition-card:nth-child(2) .icon-wrapper { color: #4ECDC4; }
        .nutrition-card:nth-child(3) .icon-wrapper { color: #FFE66D; }
        .nutrition-card:nth-child(4) .icon-wrapper { color: #FFA07A; }
        .nutrition-info { display: flex; flex-direction: column; }
        .nutrition-val { font-weight: 800; font-size: 1.1rem; }
        .nutrition-label { font-size: 0.75rem; color: #aaa; }
    </style>
</head>

<script>
    const daysArr =["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    const mealTypes =["Breakfast", "Lunch", "Snacks", "Dinner"];
    const macros = { Breakfast: { cals: 450, p: 15, c: 65, f: 14 }, Lunch: { cals: 750, p: 25, c: 110, f: 22 }, Snacks: { cals: 300, p: 10, c: 40, f: 12 }, Dinner: { cals: 680, p: 20, c: 90, f: 18 } };

    const rawMenu =[
        { d: 0, m: 0, i:["Masala / Mysore Dosa", "Sambhar", "Coconut Chutney", "Bread Butter Jam", "Boiled Egg", "Corn Flakes", "Chocolate Powder", "Milk", "Tea"] },

        { d: 1, m: 2, i:["Moong Dal Kachori / Pyaz Kachori with Ragda", "Egg Live", "Tea", "Hot & Cold Milk", "Toast / Bread / Jam / Butter", "Coffee Powder"] },

        { d: 2, m: 0, i:["Aloo Paratha", "Daliya", "Schezwan Sauce + Dahi", "Bread Butter Jam", "Boiled Egg", "Corn Flakes", "Chocolate Powder", "Milk", "Tea"] },
        { d: 2, m: 1, i:["Desi Chana", "Aloo Gobhi Mutter", "Dal Tadka", "Rice", "Roti", "Salad", "Nimbu Pani / Butter Milk"] },
        { d: 2, m: 2, i:["Vada Pav / Burger / Dabeli", "Egg Live", "Tea", "Hot & Cold Milk", "Toast / Bread / Jam / Butter", "Coffee Powder"] },
        { d: 2, m: 3, i:["Mushroom Matar Masala", "Pulao", "Vegetable Raita", "Roti", "Salad"] },
        { d: 3, m: 0, i:["Idli", "Vada", "Sambhar", "Chutney", "Daliya", "Sprout Mix", "Vegetable Sandwich", "Boiled Egg", "Corn Flakes", "Chocolate Powder", "Milk", "Tea"] },
        { d: 3, m: 1, i:["Cabbage Matar", "Moong", "Kadhi Pakoda", "White Pulav", "Roti", "Fryums", "Salad", "Nimbu Pani / Butter Milk"] },
        { d: 3, m: 2, i:["Pani Puri / Dahi Puri", "Egg Live", "Tea", "Hot & Cold Milk", "Toast / Bread / Jam / Butter", "Coffee Powder"] },
        { d: 3, m: 3, i:["Afghani Chicken / Chicken Biryani", "Paneer Kadai / Paneer Afghani / Paneer Hyderabadi", "Roti / Tandoori Naan", "Plain Rice", "Dal", "Ice Cream"] },
        { d: 4, m: 0, i:["Dry Aloo Puri / Thepla", "Daliya", "Sprout Chana", "Cheese Veg Sandwich", "Boiled Egg", "Corn Flakes", "Chocolate Powder", "Milk", "Tea"] },
        { d: 4, m: 1, i:["Veg Handi", "Mix Kathol", "Palak Dal", "Jeera Rice", "Roti", "Curd", "Nimbu Pani / Butter Milk"] },
        { d: 4, m: 2, i:["Bread Pakoda", "Egg Live", "Tea", "Hot & Cold Milk", "Toast / Bread / Jam / Butter", "Coffee Powder"] },
        { d: 4, m: 3, i:["Malai Kofta / Pav Bhaji", "Dal (only with malai kofta)", "Pulav", "Roti", "Dahi Vada", "Salad"] },
        { d: 5, m: 0, i:["Uttapam", "Sambhar", "Chutney", "Daliya", "Sprout", "Cheese Sandwich", "Boiled Egg", "Corn Flakes", "Chocolate Powder", "Milk", "Tea"] },
        { d: 5, m: 1, i:["Palak Paneer", "Jeera Rice", "Chana Dal Rajasthani", "Plain Rice", "Roti", "Curd", "Fruit Custard / Aamras / Gulab Jamun"] },
        { d: 5, m: 2, i:["Samosa Chaat", "Egg Live", "Tea", "Hot & Cold Milk", "Toast / Bread / Jam / Butter", "Coffee Powder"] },
        { d: 5, m: 3, i:["Dal Bati / Litti Chokha", "Dal", "Rice", "Roti", "Salad", "Butter Milk"] },
        { d: 6, m: 0, i:["Aloo Onion Paratha", "Schezwan Sauce + Dahi", "Daliya", "Bread Butter Jam", "Boiled Egg", "Corn Flakes", "Chocolate Powder", "Milk", "Tea"] },
        { d: 6, m: 1, i:["Kathal / Kaddu", "Vatana", "Jeera Rice", "Yellow Dal", "Roti", "Salad", "Curd"] },
        { d: 6, m: 2, i:["Maggi / Noodles / Pasta", "Egg Live", "Tea", "Hot & Cold Milk", "Toast / Bread / Jam / Butter", "Coffee Powder"] },
        { d: 6, m: 3, i:["Fried Rice", "Manchurian", "Aloo Pyaz", "Roti", "Salad", "Dahi"] }
    ];

    const timelineData = rawMenu.map(m => {
        const dayName = daysArr[m.d];
        const mealName = mealTypes[m.m];
        const formattedItems = m.i.map(item => item.replace(/\s*\/\s*/g, ' OR '));
        
        let mainDish = formattedItems[0];
        if (mealName === 'Lunch' || mealName === 'Dinner') {
            if (formattedItems.length > 1) {
                mainDish = formattedItems[0] + " & " + formattedItems[1];
            }
        }
        if (dayName === 'Wednesday' && mealName === 'Breakfast') {
            mainDish = formattedItems[0] + " & " + formattedItems[1];
        }

        const imgPath = `images/${mealName.toLowerCase()}_${dayName.toLowerCase()}.png`;

        return { ...m, dayName, mealName, items: formattedItems, mainDish, img: imgPath };
    });

    function getProbableIngredients(items) {
        let str = items.join(" ").toLowerCase(); let ing =["Local vegetables", "Salt & Spices", "Oil"];
        if(str.includes('paneer')||str.includes('cheese')) ing.push("Cottage Cheese/Dairy");
        if(str.includes('chicken')||str.includes('anda')||str.includes('egg')) ing.push("Protein Core");
        if(str.includes('rice')||str.includes('pulav')||str.includes('biryani')||str.includes('dosa')||str.includes('idli')) ing.push("Rice base");
        if(str.includes('dal')||str.includes('rajma')||str.includes('chana')) ing.push("Lentils/Pulses");
        if(str.includes('milk')||str.includes('dahi')||str.includes('curd')) ing.push("Fresh Dairy");
        if(str.includes('roti')||str.includes('puri')||str.includes('paratha')||str.includes('bread')) ing.push("Whole Wheat");
        if(str.includes('aloo')||str.includes('potato')) ing.push("Potatoes");
        return ing.join(" • ");
    }

    function isHoliday(d) {
        const mmdd = (d.getMonth() + 1 < 10 ? '0' : '') + (d.getMonth() + 1) + '-' + (d.getDate() < 10 ? '0' : '') + d.getDate();
        const yyyymmdd = d.getFullYear() + '-' + mmdd;
        const fixed =["01-01", "01-26", "08-15", "10-02", "12-25"];
        const variable =["2024-03-25", "2024-04-11", "2024-10-31", "2025-03-14", "2025-10-20", "2026-03-03", "2026-11-08"]; 
        return fixed.includes(mmdd) || variable.includes(yyyymmdd);
    }

    const tSlots = {
        wk:[{s: 8*60+15, e: 10*60+30, str:"08:15 AM - 10:30 AM"}, {s: 12*60+30, e: 14*60+45, str:"12:30 PM - 02:45 PM"}, {s: 17*60, e: 18*60+15, str:"05:00 PM - 06:15 PM"}, {s: 20*60, e: 21*60+30, str:"08:00 PM - 09:30 PM"}],
        hol:[{s: 9*60, e: 11*60, str:"09:00 AM - 11:00 AM"}, {s: 13*60, e: 14*60+30, str:"01:00 PM - 02:30 PM"}, {s: 17*60, e: 18*60+15, str:"05:00 PM - 06:15 PM"}, {s: 20*60, e: 21*60+30, str:"08:00 PM - 09:30 PM"}]
    };

    let baseSunday;
    function initBaseDate() {
        let today = new Date();
        baseSunday = new Date(today);
        baseSunday.setDate(today.getDate() - today.getDay());
        baseSunday.setHours(0,0,0,0);
    }

    function getMealTimingInfo(globalIdx) {
        let cycle = Math.floor(globalIdx / 28) - 50; 
        let localIdx = ((globalIdx % 28) + 28) % 28; 
        let meal = timelineData[localIdx];
        
        let mDate = new Date(baseSunday);
        mDate.setDate(baseSunday.getDate() + (cycle * 7) + meal.d);
        
        let isHol = isHoliday(mDate);
        let useWknd = (meal.d === 0 || meal.d === 6 || isHol);
        let slot = useWknd ? tSlots.hol[meal.m] : tSlots.wk[meal.m];
        
        return {
            ...meal, isHol, timeStr: slot.str,
            startMs: mDate.getTime() + slot.s * 60000,
            endMs: mDate.getTime() + slot.e * 60000
        };
    }

    function computeTargetGlobalIndex() {
        let nowMs = Date.now();
        let todayIdxOffset = new Date().getDay() * 4;
        let scanStart = 1400 + todayIdxOffset - 8; 
        
        for(let i = scanStart; i < scanStart + 16; i++) {
            let mInfo = getMealTimingInfo(i);
            let focusStart = mInfo.startMs - (60 * 60000); 
            let nextInfo = getMealTimingInfo(i+1);
            let focusEnd = nextInfo.startMs - (60 * 60000); 
            if(nowMs >= focusStart && nowMs < focusEnd) return i;
        }
        return 1400; 
    }

    const TOTAL_PROXIES = 2800; 
    const ITEM_HEIGHT = 80; 
    const ANGLE_SPACING = 16; 
    
    const scrollLayer = document.getElementById('scroll-layer');
    const proxyContainer = document.getElementById('scroll-proxies-container');
    const itemsContainer = document.getElementById('wheel-items-container');
    const wheelArc = document.getElementById('wheel-arc');
    
    let R, cx, cy;
    const wheelItemElements =[];

    function computeGeometry() {
        const isDesktop = window.matchMedia("(min-width: 768px)").matches;
        if (isDesktop) {
            R = window.innerHeight * 0.65;
            cx = window.innerWidth * 0.25 - R;
        } else {
            R = window.innerHeight * 0.75; 
            cx = 60 - R; 
        }
        cy = window.innerHeight / 2;

        wheelArc.style.width = `${R * 2}px`;
        wheelArc.style.height = `${R * 2}px`;
        wheelArc.style.left = `${cx}px`;
        wheelArc.style.top = `${cy}px`;
    }

    function buildInfiniteUI() {
        for(let i=0; i<TOTAL_PROXIES; i++) {
            let proxy = document.createElement('div');
            proxy.className = 'scroll-item-proxy';
            proxyContainer.appendChild(proxy);
        }
        proxyContainer.style.paddingTop = `calc(50vh - ${ITEM_HEIGHT/2}px)`;
        proxyContainer.style.paddingBottom = `calc(50vh - ${ITEM_HEIGHT/2}px)`;

        for(let i=0; i<28; i++) {
            let wItem = document.createElement('div');
            wItem.className = 'wheel-item';
            
            wItem.innerHTML = `<img src="${timelineData[i].img}" loading="lazy" onerror="this.style.display='none'; this.parentElement.style.background='#3f3f46';">`;
            
            wItem.addEventListener('click', (e) => {
                e.stopPropagation();
                let curGlobal = Math.round(scrollLayer.scrollTop / ITEM_HEIGHT);
                let curLocal = ((curGlobal % 28) + 28) % 28;
                if (curLocal === i) openCurrentSheet();
                else {
                    let diff = i - curLocal;
                    if(diff > 14) diff -= 28;
                    if(diff < -14) diff += 28;
                    scrollLayer.scrollTo({ top: (curGlobal + diff) * ITEM_HEIGHT, behavior: 'smooth' });
                }
            });

            itemsContainer.appendChild(wItem);
            wheelItemElements.push(wItem);
        }
    }

    let activeGlobalIndex = -1;
    let activeBgSlot = 1;
    let shimmerEl = document.getElementById('shimmer');

    function updateStatusUI(info, nowMs) {
        let badge = document.getElementById('ui-status');
        badge.className = 'status-badge'; 
        
        if (nowMs > info.endMs) {
            badge.textContent = "Stopped Serving";
            badge.classList.add('status-stopped');
        } else if (nowMs >= info.startMs && nowMs <= info.endMs) {
            badge.textContent = "Serving Now";
            badge.classList.add('status-serving');
        } else {
            let diffMins = Math.floor((info.startMs - nowMs) / 60000);
            if (diffMins <= 60 && diffMins > 0) {
                badge.textContent = `Will start serving in ${diffMins} mins`;
                badge.classList.add('status-starting');
            } else {
                badge.textContent = "Upcoming";
            }
        }
    }

    function updateRightPanel(globalIdx) {
        let info = getMealTimingInfo(globalIdx);
        
        document.getElementById('ui-day').textContent = info.dayName;
        document.getElementById('ui-main-dish').textContent = info.mainDish;
        document.getElementById('ui-meal-type').textContent = info.mealName;
        document.getElementById('ui-time').textContent = info.timeStr;
        document.getElementById('ui-holiday').style.display = info.isHol ? "block" : "none";

        updateStatusUI(info, Date.now());

        let nextBgSlot = activeBgSlot === 1 ? 2 : 1;
        let nextBgEl = document.getElementById(`bg-layer-${nextBgSlot}`);
        let currBgEl = document.getElementById(`bg-layer-${activeBgSlot}`);
        
        nextBgEl.style.backgroundImage = `url(${info.img})`;
        
        shimmerEl.classList.remove('play');
        void shimmerEl.offsetWidth; 
        shimmerEl.classList.add('play');

        nextBgEl.classList.add('active');
        currBgEl.classList.remove('active');
        activeBgSlot = nextBgSlot;
    }

    function renderWheel() {
        const scrollTop = scrollLayer.scrollTop;
        const continuousPos = scrollTop / ITEM_HEIGHT;
        let currentGlobal = Math.round(continuousPos);
        currentGlobal = Math.max(0, Math.min(TOTAL_PROXIES - 1, currentGlobal));

        if (currentGlobal !== activeGlobalIndex) {
            activeGlobalIndex = currentGlobal;
            updateRightPanel(activeGlobalIndex);
        }

        wheelItemElements.forEach((el, i) => {
            let localWrap = ((continuousPos % 28) + 28) % 28;
            let relPos = i - localWrap;
            
            if (relPos > 14) relPos -= 28;
            if (relPos < -14) relPos += 28;

            let theta = relPos * ANGLE_SPACING * (Math.PI / 180);
            let x = cx + R * Math.cos(theta);
            let y = cy + R * Math.sin(theta);

            el.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;
            if (Math.abs(relPos) < 0.5) el.classList.add('active');
            else el.classList.remove('active');
        });
    }

    let lastInteractionTime = 0;
    let autoTargetIndex = -1;

    function handleInteraction() { lastInteractionTime = Date.now(); }['touchstart','touchmove','wheel','mousedown'].forEach(ev => window.addEventListener(ev, handleInteraction));

    setInterval(() => {
        let nowMs = Date.now();
        let target = computeTargetGlobalIndex();
        
        if (target !== autoTargetIndex) {
            autoTargetIndex = target;
            if (nowMs - lastInteractionTime > 8000) {
                scrollLayer.scrollTo({ top: target * ITEM_HEIGHT, behavior: 'smooth' });
            }
        }
        if(activeGlobalIndex !== -1) {
            updateStatusUI(getMealTimingInfo(activeGlobalIndex), nowMs);
        }
    }, 1000);

    const sheet = document.getElementById('details-sheet');
    function openCurrentSheet() {
        if(activeGlobalIndex === -1) return;
        let info = getMealTimingInfo(activeGlobalIndex);
        document.getElementById('sheet-title').textContent = `${info.dayName} ${info.mealName}`;
        document.getElementById('sheet-items').innerHTML = info.items.map(item => `• ${item}`).join('<br>');
        document.getElementById('sheet-ingredients').textContent = getProbableIngredients(info.items);
        
        let mod = info.items.length; let b = macros[info.mealName];
        document.getElementById('sheet-cals').textContent = b.cals + (mod*5);
        document.getElementById('sheet-pro').textContent = (b.p + mod) + "g";
        document.getElementById('sheet-carbs').textContent = (b.c + mod) + "g";
        document.getElementById('sheet-fats').textContent = b.f + "g";
        sheet.classList.add('open');
    }
    
    function closeSheet() { sheet.classList.remove('open'); }
    
    let startY = 0;
    sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, {passive: true});
    sheet.addEventListener('touchend', e => { if (e.changedTouches[0].clientY > startY + 50) closeSheet(); });

    scrollLayer.addEventListener('scroll', () => requestAnimationFrame(renderWheel));
    window.addEventListener('resize', () => { computeGeometry(); renderWheel(); });

    window.addEventListener('DOMContentLoaded', () => {
        initBaseDate();
        computeGeometry();
        buildInfiniteUI();
        
        autoTargetIndex = computeTargetGlobalIndex();
        
        setTimeout(() => {
            scrollLayer.scrollTo({ top: autoTargetIndex * ITEM_HEIGHT, behavior: 'auto' });
            renderWheel();
        }, 50);
    });

</script>
</body>
</html>
